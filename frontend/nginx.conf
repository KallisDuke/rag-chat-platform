server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve ES modules with the correct MIME type without touching the rest of
    # the inherited mime.types map (a server-level `types` block would replace
    # it wholesale, breaking css/svg/png).
    location ~* \.mjs$ {
        types { application/javascript mjs; }
    }

    # SPA fallback: unknown paths resolve to index.html so client-side
    # routing (/chat, /upload, /admin, ...) works on direct load / refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Fingerprinted build assets can be cached aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # The HTML entry point must not be cached, or clients pin a stale bundle.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    # Basic gzip for text assets.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
